{# Component: error-banner #}
  <!-- ── Eski Hata Gösterimi (uyumluluk) ──────────────────────────────── -->
  <div x-show="globalError"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 -translate-y-10"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-10"
       class="fixed top-8 left-1/2 -translate-x-1/2 z-[9998] w-full max-w-lg px-4"
       @click.away="clearError()">
    <div class="bg-slate-900/90 border border-red-500/50 backdrop-blur-xl p-4 rounded-2xl shadow-2xl flex items-start gap-4 ring-1 ring-red-500/20">
      <div class="w-12 h-12 bg-red-600/20 rounded-xl flex items-center justify-center shrink-0 text-red-500">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      </div>
      <div class="flex-1 pt-1">
        <div class="text-white font-bold text-base mb-1">Bir Hata Oluştu</div>
        <div class="text-slate-400 text-sm leading-relaxed" x-text="globalError"></div>
      </div>
      <button @click="clearError()" class="text-slate-500 hover:text-white transition-colors p-2 mt-0.5">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
  </div>
