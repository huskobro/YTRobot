{# Component: header #}
    <!-- ── Top Header Bar with Notification Bell ─── -->
    <div class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800/50 px-6 py-2 flex items-center justify-between">
      <!-- Mobile hamburger -->
      <button @click="sidebarOpen=!sidebarOpen" class="md:hidden p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="flex-1"></div>
      <!-- Search Button (triggers Cmd+K) -->
      <button @click="toggleCommandPalette()"
              class="p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all mr-1"
              :title="(lang==='tr' ? 'Ara' : 'Search') + ' (⌘K)'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </button>
      <!-- Notification Bell -->
      <div class="relative" @click.away="notifOpen = false">
        <button @click="notifOpen = !notifOpen; if(notifOpen) loadNotifications()"
                class="relative p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <!-- Unread badge -->
          <span x-show="unreadCount > 0"
                class="absolute -top-0.5 -right-0.5 w-4.5 h-4.5 bg-red-500 text-white text-[9px] font-black rounded-full flex items-center justify-center min-w-[18px] h-[18px] shadow-lg shadow-red-900/50"
                x-text="unreadCount > 99 ? '99+' : unreadCount"></span>
        </button>

        <!-- Notification Dropdown -->
        <div x-show="notifOpen" x-cloak
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95 -translate-y-2"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="absolute right-0 top-full mt-2 w-96 bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl shadow-black/40 overflow-hidden">
          <!-- Header -->
          <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
            <h3 class="text-xs font-black text-white uppercase tracking-widest" x-text="t('notif_title')"></h3>
            <button @click="markAllRead()" x-show="unreadCount > 0"
                    class="text-[10px] font-bold text-blue-400 hover:text-blue-300 transition-colors"
                    x-text="t('notif_mark_all_read')"></button>
          </div>
          <!-- Notification List -->
          <div class="max-h-80 overflow-y-auto custom-scrollbar">
            <div x-show="notifications.length === 0" class="py-10 text-center">
              <div class="text-2xl mb-2 opacity-20">🔔</div>
              <div class="text-slate-500 text-xs" x-text="t('notif_empty')"></div>
            </div>
            <template x-for="notif in notifications" :key="notif.id">
              <div @click="markNotifRead(notif.id)"
                   class="flex items-start gap-3 px-4 py-3 border-b border-slate-800/50 hover:bg-slate-800/40 cursor-pointer transition-colors"
                   :class="!notif.read ? 'bg-slate-800/20' : ''">
                <!-- Unread dot -->
                <div class="mt-1.5 shrink-0">
                  <div class="w-2 h-2 rounded-full" :class="!notif.read ? 'bg-blue-400' : 'bg-transparent'"></div>
                </div>
                <!-- Icon by type -->
                <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 text-sm"
                     :class="{
                       'bg-emerald-600/10 text-emerald-400': notif.type === 'success',
                       'bg-red-600/10 text-red-400': notif.type === 'error',
                       'bg-blue-600/10 text-blue-400': notif.type === 'info',
                       'bg-amber-600/10 text-amber-400': notif.type === 'warning',
                       'bg-slate-700 text-slate-400': !notif.type
                     }">
                  <span x-text="notif.type==='success'?'✓':notif.type==='error'?'✕':notif.type==='warning'?'⚠':'ℹ'"></span>
                </div>
                <!-- Content -->
                <div class="flex-1 min-w-0">
                  <div class="text-xs text-white leading-relaxed" :class="!notif.read ? 'font-semibold' : ''" x-text="notif.message"></div>
                  <div class="text-[10px] text-slate-500 mt-1" x-text="notif.created_at ? timeAgo(notif.created_at) : ''"></div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
