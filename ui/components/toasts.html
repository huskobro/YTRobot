{# Component: toasts #}
  <!-- ── Toast Bildirim Sistemi ───────────────────────────────────────── -->
  <div class="fixed top-6 right-6 z-[9999] flex flex-col gap-2 w-80 pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="pointer-events-auto"
           x-show="true"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-x-8 scale-95"
           x-transition:enter-end="opacity-100 translate-x-0 scale-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100 translate-x-0 scale-100"
           x-transition:leave-end="opacity-0 translate-x-8 scale-95">
        <div class="backdrop-blur-xl border rounded-xl p-3.5 shadow-2xl flex items-start gap-3"
             :class="{
               'bg-slate-900/95 border-red-500/50 ring-1 ring-red-500/20': toast.type === 'error',
               'bg-slate-900/95 border-emerald-500/50 ring-1 ring-emerald-500/20': toast.type === 'success',
               'bg-slate-900/95 border-blue-500/50 ring-1 ring-blue-500/20': toast.type === 'info',
               'bg-slate-900/95 border-amber-500/50 ring-1 ring-amber-500/20': toast.type === 'warning',
             }">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 mt-0.5"
               :class="{
                 'bg-red-600/20 text-red-400': toast.type === 'error',
                 'bg-emerald-600/20 text-emerald-400': toast.type === 'success',
                 'bg-blue-600/20 text-blue-400': toast.type === 'info',
                 'bg-amber-600/20 text-amber-400': toast.type === 'warning',
               }">
            <template x-if="toast.type === 'error'"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path></svg></template>
            <template x-if="toast.type === 'success'"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></template>
            <template x-if="toast.type === 'info'"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></template>
            <template x-if="toast.type === 'warning'"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></template>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-white font-semibold text-sm"
                 x-text="toast.type === 'error' ? 'Hata' : toast.type === 'success' ? 'Başarılı' : toast.type === 'warning' ? 'Uyarı' : 'Bilgi'"></div>
            <div class="text-slate-400 text-xs mt-0.5 leading-relaxed break-words" x-text="toast.message"></div>
          </div>
          <button @click="dismissToast(toast.id)" class="text-slate-600 hover:text-slate-300 transition-colors shrink-0 mt-0.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      </div>
    </template>
  </div>
