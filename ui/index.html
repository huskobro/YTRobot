<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTRobot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .log-line { font-family: 'Cascadia Code','Fira Code','Courier New',monospace; font-size: 12px; line-height: 1.6; }
    @keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .animate-spin-slow { animation: spin-slow 1.2s linear infinite; display:inline-block; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#475569; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden">

<div x-data="app()" x-init="init()" x-cloak class="flex h-screen">

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <aside class="w-52 shrink-0 bg-slate-900 border-r border-slate-800 flex flex-col">
    <div class="px-5 py-5 border-b border-slate-800">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-red-900/40">▶</div>
        <div>
          <div class="font-bold text-white leading-tight">YTRobot</div>
          <div class="text-slate-500 text-xs" x-text="t('app_subtitle')"></div>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1">
      <button @click="view='dashboard'"
              class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2.5 transition-all"
              :class="view==='dashboard'?'bg-indigo-600 text-white shadow-md shadow-indigo-900/40':'text-slate-400 hover:bg-slate-800 hover:text-white'">
        <span>📊</span> <span x-text="t('nav_dashboard')"></span>
      </button>
      <button @click="view='new-run';mode='topic';runError=''"
              class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2.5 transition-all"
              :class="view==='new-run'?'bg-indigo-600 text-white shadow-md shadow-indigo-900/40':'text-slate-400 hover:bg-slate-800 hover:text-white'">
        <span>✨</span> <span x-text="t('nav_new_video')"></span>
      </button>
      <button @click="loadSettings();view='settings'"
              class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2.5 transition-all"
              :class="view==='settings'?'bg-indigo-600 text-white shadow-md shadow-indigo-900/40':'text-slate-400 hover:bg-slate-800 hover:text-white'">
        <span>⚙️</span> <span x-text="t('nav_settings')"></span>
      </button>
    </nav>

    <!-- Stats -->
    <div class="px-4 py-3 border-t border-slate-800 space-y-1.5">
      <div class="flex items-center justify-between text-xs">
        <span class="text-slate-500" x-text="t('sidebar_running')"></span>
        <span class="font-mono font-bold" :class="sessions.filter(s=>s.status==='running').length>0?'text-blue-400':'text-slate-500'"
              x-text="sessions.filter(s=>s.status==='running').length"></span>
      </div>
      <div class="flex items-center justify-between text-xs">
        <span class="text-slate-500" x-text="t('sidebar_completed')"></span>
        <span class="font-mono text-green-400" x-text="sessions.filter(s=>s.status==='completed').length"></span>
      </div>
      <div class="flex items-center justify-between text-xs">
        <span class="text-slate-500" x-text="t('sidebar_total')"></span>
        <span class="font-mono text-slate-400" x-text="sessions.length"></span>
      </div>
    </div>

    <!-- Language toggle -->
    <div class="px-4 py-3 border-t border-slate-800">
      <div class="flex gap-1 p-1 bg-slate-800 rounded-lg">
        <button @click="setLang('tr')" class="flex-1 py-1.5 text-xs font-bold rounded-md transition-all"
                :class="lang==='tr'?'bg-indigo-600 text-white':'text-slate-400 hover:text-white'">TR</button>
        <button @click="setLang('en')" class="flex-1 py-1.5 text-xs font-bold rounded-md transition-all"
                :class="lang==='en'?'bg-indigo-600 text-white':'text-slate-400 hover:text-white'">EN</button>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────────────────────── -->
  <main class="flex-1 overflow-y-auto bg-slate-950">

    <!-- ══ DASHBOARD ══════════════════════════════════════════════════ -->
    <div x-show="view==='dashboard'" class="p-6">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-white" x-text="t('dashboard_title')"></h1>
          <p class="text-slate-500 text-sm mt-0.5" x-text="t('dashboard_subtitle')"></p>
        </div>
        <button @click="view='new-run';mode='topic';runError=''"
                class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg shadow-md shadow-indigo-900/30 transition-all">
          <span x-text="t('dashboard_new_video')"></span>
        </button>
      </div>

      <!-- Filter bar -->
      <div x-show="sessions.length>0" class="flex gap-2 mb-5 flex-wrap">
        <template x-for="f in ['all','running','queued','paused','completed','failed','stopped']" :key="f">
          <button @click="filter=f"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg border transition-all"
                  :class="filter===f ? 'bg-indigo-600 text-white border-indigo-500 shadow-sm shadow-indigo-900/40' : 'text-slate-400 border-slate-700 hover:border-slate-500 hover:text-slate-200'"
                  x-text="t('filter_'+f)"></button>
        </template>
        <span class="ml-auto text-xs text-slate-600 self-center" x-text="filteredSessions().length+' / '+sessions.length"></span>
      </div>

      <!-- Empty -->
      <div x-show="sessions.length===0" class="flex flex-col items-center justify-center py-32 text-center">
        <div class="text-6xl mb-4">🎬</div>
        <div class="text-xl font-semibold text-white mb-2" x-text="t('empty_title')"></div>
        <div class="text-slate-500 text-sm mb-6" x-text="t('empty_subtitle')"></div>
        <button @click="view='new-run';mode='topic'"
                class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-lg transition-all"
                x-text="t('empty_cta')"></button>
      </div>

      <!-- Empty filter result -->
      <div x-show="sessions.length>0 && filteredSessions().length===0" class="flex flex-col items-center justify-center py-20 text-center">
        <div class="text-4xl mb-3">🔍</div>
        <div class="text-slate-500 text-sm">No sessions match the current filter</div>
      </div>

      <!-- Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <template x-for="session in filteredSessions()" :key="session.id">
          <div @click="openSession(session)"
               class="bg-slate-900 border border-slate-800 rounded-xl p-5 cursor-pointer hover:border-slate-600 hover:bg-slate-800/60 transition-all group relative overflow-hidden">
            <div x-show="session.status==='running'" class="absolute inset-0 bg-blue-500/5 pointer-events-none"></div>
            <div x-show="session.status==='paused'" class="absolute inset-0 bg-purple-500/5 pointer-events-none"></div>
            <div class="flex items-start justify-between mb-3">
              <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border" :class="statusBadge(session.status)"
                    x-text="t('status_'+session.status) || session.status.toUpperCase()"></span>
              <span class="text-xs text-slate-600 font-mono" x-text="formatDate(session.started_at)"></span>
            </div>
            <div class="font-semibold text-white mb-0.5 line-clamp-2 group-hover:text-indigo-300 transition-colors text-sm"
                 x-text="session.topic||session.id"></div>
            <div class="text-xs text-slate-600 font-mono mb-3" x-text="session.id"></div>
            <!-- Mini step track -->
            <div class="flex gap-1 mb-3">
              <template x-for="(step,i) in (session.steps||[])" :key="i">
                <div class="flex-1 h-1.5 rounded-full transition-all"
                     :class="step.status==='completed'?'bg-green-500':step.status==='running'?'bg-blue-500 animate-pulse':step.status==='failed'?'bg-red-500':'bg-slate-700'"></div>
              </template>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs text-slate-500">
                <span x-text="(session.steps||[]).filter(s=>s.status==='completed').length"></span>/6 <span x-text="t('steps_label')"></span>
              </span>
              <span x-show="session.status==='running'" class="text-xs text-blue-400">↻ <span x-text="(session.steps||[])[session.current_step]?.name||'...'"></span></span>
              <span x-show="session.status==='completed'" class="text-xs text-green-400">✓ <span x-text="t('status_completed')"></span></span>
              <span x-show="session.status==='queued'" class="text-xs text-yellow-400">⏳ <span x-text="t('status_queued')"></span></span>
              <span x-show="session.status==='paused'" class="text-xs text-purple-400">⏸ <span x-text="t('status_paused')"></span></span>
              <span x-show="session.status==='stopped'" class="text-xs text-orange-400">⏹ <span x-text="t('status_stopped')"></span></span>
            </div>
            <div x-show="session.error" class="mt-2.5 px-2.5 py-1.5 bg-red-900/30 border border-red-800/50 rounded-lg text-xs text-red-400 line-clamp-2" x-text="session.error"></div>
            <div x-show="session.notes&&session.notes.trim()" class="mt-2 text-xs text-slate-500 flex items-center gap-1">
              <span>📝</span><span class="truncate" x-text="session.notes"></span>
            </div>
            <!-- Action buttons -->
            <div class="flex gap-1.5 mt-3 pt-3 border-t border-slate-800/70" @click.stop>
              <button x-show="['running','queued','paused'].includes(session.status)"
                      @click="sessionAction('stop', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-red-900/30 border border-red-700/40 text-red-400 hover:bg-red-900/60 transition-all"
                      x-text="t('btn_stop')"></button>
              <button x-show="session.status==='running'"
                      @click="sessionAction('pause', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-purple-900/30 border border-purple-700/40 text-purple-400 hover:bg-purple-900/60 transition-all"
                      x-text="t('btn_pause')"></button>
              <button x-show="session.status==='paused'"
                      @click="sessionAction('resume', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-blue-900/30 border border-blue-700/40 text-blue-400 hover:bg-blue-900/60 transition-all"
                      x-text="t('btn_resume')"></button>
              <button x-show="['completed','failed','stopped'].includes(session.status)"
                      @click="sessionAction('restart', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-all"
                      x-text="t('btn_restart')"></button>
              <button @click="deleteSession(session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md ml-auto bg-slate-800/50 border border-slate-700/50 text-slate-500 hover:text-red-400 hover:border-red-700/50 transition-all"
                      x-text="t('btn_delete')"></button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ══ SESSION DETAIL ══════════════════════════════════════════════ -->
    <div x-show="view==='session'&&currentSession" class="p-6 max-w-5xl mx-auto">
      <div class="flex items-center gap-3 mb-6">
        <button @click="closeSession()" class="flex items-center gap-1.5 text-slate-400 hover:text-white transition-colors text-sm" x-text="t('back')"></button>
        <span class="text-slate-700">/</span>
        <h1 class="font-semibold text-white truncate flex-1" x-text="currentSession?.topic||currentSession?.id"></h1>
        <span class="shrink-0 px-3 py-1 rounded-full text-xs font-bold border" :class="statusBadge(currentSession?.status)"
              x-text="t('status_'+(currentSession?.status||'')) || (currentSession?.status||'').toUpperCase()"></span>
        <div class="flex gap-2 ml-2 shrink-0">
          <button x-show="['running','queued','paused'].includes(currentSession?.status)"
                  @click="sessionAction('stop', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-red-900/30 border border-red-700/40 text-red-400 hover:bg-red-900/60 transition-all"
                  x-text="t('btn_stop')"></button>
          <button x-show="currentSession?.status==='running'"
                  @click="sessionAction('pause', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-purple-900/30 border border-purple-700/40 text-purple-400 hover:bg-purple-900/60 transition-all"
                  x-text="t('btn_pause')"></button>
          <button x-show="currentSession?.status==='paused'"
                  @click="sessionAction('resume', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-blue-900/30 border border-blue-700/40 text-blue-400 hover:bg-blue-900/60 transition-all"
                  x-text="t('btn_resume')"></button>
          <button x-show="['completed','failed','stopped'].includes(currentSession?.status)"
                  @click="sessionAction('restart', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-all"
                  x-text="t('btn_restart')"></button>
          <button @click="deleteSession(currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-800/50 border border-slate-700/50 text-slate-500 hover:text-red-400 hover:border-red-700/50 transition-all"
                  x-text="t('btn_delete')"></button>
        </div>
      </div>

      <!-- Step tracker -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 mb-4">
        <div class="flex items-center justify-between mb-5">
          <span class="text-sm font-semibold text-slate-300" x-text="t('progress_title')"></span>
          <span class="text-xs text-slate-500">
            <span x-text="(currentSession?.steps||[]).filter(s=>s.status==='completed').length"></span>/6 <span x-text="t('progress_complete')"></span>
          </span>
        </div>
        <div class="relative flex justify-between items-start px-2">
          <div class="absolute left-6 right-6 top-3.5 h-0.5 bg-slate-700 z-0"></div>
          <div class="absolute left-6 top-3.5 h-0.5 bg-green-500 z-0 transition-all duration-700"
               :style="`width: calc(${progressPct(currentSession)} * (100% - 48px) / 100)`"></div>
          <template x-for="(step, idx) in (currentSession?.steps||[])" :key="idx">
            <div class="relative flex flex-col items-center z-10" style="min-width:60px">
              <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold transition-all" :class="stepCircle(step.status)">
                <span x-show="step.status==='completed'">✓</span>
                <span x-show="step.status==='running'" class="animate-spin-slow">↻</span>
                <span x-show="step.status==='failed'">✗</span>
                <span x-show="step.status==='pending'" x-text="idx+1"></span>
              </div>
              <div class="text-center mt-2 text-xs leading-tight max-w-14"
                   :class="step.status==='completed'?'text-green-400':step.status==='running'?'text-blue-400 font-semibold':step.status==='failed'?'text-red-400':'text-slate-600'"
                   x-text="t('step_'+step.name.toLowerCase().replace(' ','_')) || step.name"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Log + Sidebar -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
        <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden flex flex-col">
          <div class="px-4 py-3 border-b border-slate-800 flex items-center justify-between shrink-0">
            <span class="text-sm font-semibold text-slate-300" x-text="t('live_log')"></span>
            <div class="flex items-center gap-3">
              <span class="text-xs text-slate-600" x-text="logLines.length+' '+t('lines')"></span>
              <div x-show="currentSession?.status==='running'" class="flex items-center gap-1.5">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                <span class="text-xs text-blue-400 font-medium" x-text="t('live')"></span>
              </div>
              <div x-show="currentSession?.status==='completed'" class="flex items-center gap-1.5">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-xs text-green-400 font-medium" x-text="t('done')"></span>
              </div>
              <div x-show="currentSession?.status==='failed'" class="flex items-center gap-1.5">
                <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                <span class="text-xs text-red-400 font-medium" x-text="t('failed_label')"></span>
              </div>
            </div>
          </div>
          <div id="log-container" class="h-72 overflow-y-auto p-4 bg-slate-950 space-y-0.5">
            <div x-show="logLines.length===0" class="text-slate-700 text-xs italic" x-text="t('waiting')"></div>
            <template x-for="(line,i) in logLines" :key="i">
              <div class="log-line whitespace-pre-wrap break-all"
                   :class="line.includes('✓')?'text-green-400':/\[\d\/6\]/.test(line)?'text-indigo-400 font-semibold':line.toLowerCase().includes('error')||line.toLowerCase().includes('failed')?'text-red-400':line.startsWith('  ')?'text-slate-400':'text-slate-300'"
                   x-text="line||' '"></div>
            </template>
          </div>
        </div>

        <div class="space-y-4">
          <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
            <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3" x-text="t('info')"></div>
            <dl class="space-y-2.5">
              <div>
                <dt class="text-xs text-slate-600" x-text="t('session_id')"></dt>
                <dd class="font-mono text-slate-300 text-xs mt-0.5" x-text="currentSession?.id"></dd>
              </div>
              <div>
                <dt class="text-xs text-slate-600" x-text="t('started')"></dt>
                <dd class="text-slate-300 text-xs mt-0.5" x-text="formatDate(currentSession?.started_at)"></dd>
              </div>
              <div x-show="currentSession?.completed_at">
                <dt class="text-xs text-slate-600" x-text="t('completed_at')"></dt>
                <dd class="text-slate-300 text-xs mt-0.5" x-text="formatDate(currentSession?.completed_at)"></dd>
              </div>
              <div x-show="currentSession?.output_file">
                <dt class="text-xs text-slate-600" x-text="t('output_file')"></dt>
                <dd class="text-green-400 text-xs font-mono mt-0.5 break-all" x-text="currentSession?.output_file"></dd>
              </div>
              <div x-show="currentSession?.error">
                <dt class="text-xs text-red-500" x-text="t('error')"></dt>
                <dd class="text-red-400 text-xs mt-0.5 break-all" x-text="currentSession?.error"></dd>
              </div>
            </dl>
          </div>

          <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
            <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2.5" x-text="t('notes')"></div>
            <textarea x-model="notes" @blur="saveNotes()"
                      class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 resize-none focus:outline-none focus:border-indigo-500 placeholder-slate-600 transition-colors"
                      rows="5" :placeholder="t('notes_placeholder')"></textarea>
            <div x-show="notesSaved" x-transition class="text-xs text-green-400 mt-1" x-text="t('notes_saved')"></div>
          </div>
        </div>
      </div>

      <!-- Metadata -->
      <div x-show="currentSession?.metadata" class="bg-slate-900 border border-slate-800 rounded-xl p-6">
        <div class="flex items-center justify-between mb-5">
          <span class="text-sm font-semibold text-slate-300" x-text="t('yt_metadata')"></span>
          <button @click="copyMetadata()" class="px-3 py-1 text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-slate-300 transition-colors">
            <span x-show="!metaCopied" x-text="t('copy_all')"></span>
            <span x-show="metaCopied" class="text-green-400" x-text="t('copied')"></span>
          </button>
        </div>
        <div class="space-y-5">
          <div>
            <div class="text-xs text-slate-500 mb-1.5 font-medium" x-text="t('title_label')"></div>
            <div class="text-white font-semibold text-lg leading-snug" x-text="currentSession?.metadata?.title"></div>
          </div>
          <div>
            <div class="text-xs text-slate-500 mb-1.5 font-medium" x-text="t('desc_label')"></div>
            <div class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap bg-slate-800/50 rounded-lg p-3"
                 x-text="currentSession?.metadata?.description"></div>
          </div>
          <div>
            <div class="text-xs text-slate-500 mb-2 font-medium" x-text="t('tags_label')"></div>
            <div class="flex flex-wrap gap-1.5">
              <template x-for="tag in (currentSession?.metadata?.tags||[])" :key="tag">
                <span class="px-2.5 py-0.5 bg-indigo-900/40 border border-indigo-700/40 rounded-full text-xs text-indigo-300" x-text="tag"></span>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ NEW RUN ══════════════════════════════════════════════════════ -->
    <div x-show="view==='new-run'" class="p-6">
      <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold text-white mb-2" x-text="t('new_video_title')"></h1>
        <p class="text-slate-500 text-sm mb-6" x-text="t('new_video_subtitle')"></p>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
          <div class="flex gap-1 p-1 bg-slate-800 rounded-xl mb-6">
            <button @click="mode='topic'" class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center justify-center gap-2"
                    :class="mode==='topic'?'bg-indigo-600 text-white shadow-md':'text-slate-400 hover:text-white'"
                    x-text="t('mode_topic')"></button>
            <button @click="mode='script'" class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center justify-center gap-2"
                    :class="mode==='script'?'bg-indigo-600 text-white shadow-md':'text-slate-400 hover:text-white'"
                    x-text="t('mode_script')"></button>
          </div>

// ── App ──────────────────────────────────────────────────────────────────────
function app() {
  return {
    lang: localStorage.getItem('ytrobot-lang') || 'en',
    view: 'dashboard', mode: 'topic',
    sessions: [], currentSession: null, settings: {},
    newTopic: '', newScriptFile: '', notes: '', logLines: [],
    submitting: false, runError: '',
    settingsSaved: false, notesSaved: false, metaCopied: false,
    filter: 'all',
    _sse: null, _timer: null,

    t(key) { return LANG[this.lang]?.[key] ?? LANG.en[key] ?? key; },
    setLang(l) { this.lang = l; localStorage.setItem('ytrobot-lang', l); },
    pipelineSteps() { return this.t('pipeline_steps'); },

    async init() {
      await this.loadSessions();
      this._timer = setInterval(() => this.loadSessions(), 3000);
    },

    async loadSessions() {
      try {
        const r = await fetch('/api/sessions');
        this.sessions = await r.json();
        if (this.currentSession) {
          const u = this.sessions.find(s => s.id === this.currentSession.id);
          if (u) this.currentSession = u;
        }
      } catch(e) {}
    },

    openSession(session) {
      this.currentSession = session;
      this.notes = session.notes || '';
      this.logLines = [];
      this.view = 'session';
      if (this._sse) { this._sse.close(); this._sse = null; }
      const es = new EventSource(`/api/sessions/${session.id}/logs`);
      this._sse = es;
      es.onmessage = (e) => {
        const line = JSON.parse(e.data);
        if (line === '__DONE__') { es.close(); this._sse = null; this.loadSessions(); return; }
        this.logLines.push(line);
        this.$nextTick(() => { const el = document.getElementById('log-container'); if (el) el.scrollTop = el.scrollHeight; });
      };
      es.onerror = () => { es.close(); this._sse = null; };
    },

    closeSession() {
      if (this._sse) { this._sse.close(); this._sse = null; }
      this.currentSession = null; this.logLines = []; this.view = 'dashboard';
    },

    async saveNotes() {
      if (!this.currentSession) return;
      await fetch(`/api/sessions/${this.currentSession.id}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ notes: this.notes }),
      });
      this.notesSaved = true; setTimeout(() => this.notesSaved = false, 2000);
    },

    async submitRun() {
      this.runError = '';
      const body = {};
      if (this.mode === 'topic') {
        if (!this.newTopic.trim()) { this.runError = this.t('error_topic'); return; }
        body.topic = this.newTopic.trim();
      } else {
        if (!this.newScriptFile.trim()) { this.runError = this.t('error_script'); return; }
        body.script_file = this.newScriptFile.trim();
      }
      this.submitting = true;
      try {
        const r = await fetch('/api/run', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (!r.ok) { this.runError = (await r.json()).detail || 'Request failed'; return; }
        const { session_id } = await r.json();
        this.newTopic = ''; this.newScriptFile = '';
        await this.loadSessions();
        const session = this.sessions.find(s => s.id === session_id);
        if (session) this.openSession(session);
      } catch(e) { this.runError = e.message; }
      finally { this.submitting = false; }
    },

    async loadSettings() { const r = await fetch('/api/settings'); this.settings = await r.json(); },

    async saveSettings() {
      await fetch('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ values: this.settings }) });
      this.settingsSaved = true; setTimeout(() => this.settingsSaved = false, 3000);
    },

    async copyMetadata() {
      if (!this.currentSession?.metadata) return;
      const m = this.currentSession.metadata;
      const text = `Title: ${m.title}\n\nDescription:\n${m.description}\n\nTags: ${(m.tags||[]).join(', ')}`;
      await navigator.clipboard.writeText(text);
      this.metaCopied = true; setTimeout(() => this.metaCopied = false, 2000);
    },

    progressPct(session) {
      if (!session?.steps) return 0;
      if (session.status === 'completed') return 100;
      const done = session.steps.filter(s => s.status === 'completed').length;
      return Math.round((done / session.steps.length) * 100);
    },

    filteredSessions() {
      if (this.filter === 'all') return this.sessions;
      return this.sessions.filter(s => s.status === this.filter);
    },

    async sessionAction(action, sid, e) {
      e.stopPropagation();
      try {
        await fetch(`/api/sessions/${sid}/${action}`, { method: 'POST' });
        await this.loadSessions();
      } catch(err) { console.error(err); }
    },

    async deleteSession(sid, e) {
      e.stopPropagation();
      if (!window.confirm(this.t('confirm_delete_msg'))) return;
      await fetch(`/api/sessions/${sid}`, { method: 'DELETE' });
      if (this.currentSession?.id === sid) this.closeSession();
      await this.loadSessions();
    },

    statusBadge(status) {
      return {
        queued:'text-yellow-400 bg-yellow-400/10 border-yellow-500/30',
        running:'text-blue-400 bg-blue-400/10 border-blue-500/30',
        completed:'text-green-400 bg-green-400/10 border-green-500/30',
        failed:'text-red-400 bg-red-400/10 border-red-500/30',
        stopped:'text-orange-400 bg-orange-400/10 border-orange-500/30',
        paused:'text-purple-400 bg-purple-400/10 border-purple-500/30',
      }[status] || 'text-slate-400 bg-slate-800 border-slate-700';
    },

    stepCircle(status) {
      return { pending:'border-slate-700 text-slate-600 bg-slate-900', running:'border-blue-500 text-blue-400 bg-blue-500/10 shadow-sm shadow-blue-500/30', completed:'border-green-500 text-green-400 bg-green-500/10', failed:'border-red-500 text-red-400 bg-red-500/10' }[status] || 'border-slate-700 text-slate-600 bg-slate-900';
    },

    formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString(this.lang === 'tr' ? 'tr-TR' : 'en-US', { month:'short', day:'numeric' }) + ' ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    },
  };
}
