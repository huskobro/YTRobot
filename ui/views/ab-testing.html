{# View: A/B Testing #}
    <!-- ══ A/B TESTING ════════════════════════════════════════════════ -->
    <div x-show="view==='ab-testing' || (view==='content-planning' && contentPlanningTab==='ab-testing')" class="p-6">
      <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-6">
          <h1 class="text-3xl font-black text-white tracking-tight" x-text="t('ab_test_title')"></h1>
          <button @click="abTestModalOpen = true" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white text-sm font-bold rounded-xl transition-all" x-text="t('ab_test_create')"></button>
        </div>

        <!-- Test List -->
        <div class="space-y-4">
          <template x-for="test in abTests" :key="test.id">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
              <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                  <span class="text-sm font-semibold text-white" x-text="test.video_id"></span>
                  <span class="text-[10px] px-2 py-0.5 rounded-full font-bold"
                        :class="test.status === 'completed' ? 'bg-green-900/60 text-green-400 border border-green-700/50' : 'bg-blue-900/60 text-blue-400 border border-blue-700/50'"
                        x-text="test.status"></span>
                </div>
                <div class="flex items-center gap-3">
                  <span class="text-[10px] text-slate-500" x-text="test.created_at ? new Date(test.created_at).toLocaleDateString() : ''"></span>
                  <button x-show="test.status === 'active'" @click="completeAbTest(test.id)"
                          class="px-3 py-1.5 text-xs font-bold rounded-lg bg-green-900/30 border border-green-700/40 text-green-400 hover:bg-green-900/60 transition-all"
                          x-text="t('ab_test_complete')"></button>
                </div>
              </div>
              <!-- Variants Table -->
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="text-[10px] text-slate-500 uppercase">
                      <th class="text-left py-2 px-3" x-text="t('ab_test_variant')"></th>
                      <th class="text-center py-2 px-3" x-text="t('ab_test_impressions')"></th>
                      <th class="text-center py-2 px-3" x-text="t('ab_test_clicks')"></th>
                      <th class="text-center py-2 px-3" x-text="t('ab_test_ctr')"></th>
                      <th class="text-center py-2 px-3"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="(variant, vIdx) in (test.variants || [])" :key="vIdx">
                      <tr class="border-t border-slate-800/50">
                        <td class="py-2.5 px-3 text-white font-medium" x-text="variant.title || variant"></td>
                        <td class="py-2.5 px-3 text-center text-slate-400" x-text="variant.impressions || 0"></td>
                        <td class="py-2.5 px-3 text-center text-slate-400" x-text="variant.clicks || 0"></td>
                        <td class="py-2.5 px-3 text-center text-slate-400" x-text="abTestCtr(variant) + '%'"></td>
                        <td class="py-2.5 px-3 text-center">
                          <span x-show="test.status === 'completed' && abTestWinnerIndex(test) === vIdx"
                                class="px-2 py-0.5 bg-green-900/60 text-green-400 border border-green-700/50 rounded-full text-[10px] font-bold"
                                x-text="t('ab_test_winner')"></span>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </template>
        </div>

        <div x-show="abTests.length === 0" class="text-center py-16">
          <div class="text-4xl mb-3">🧪</div>
          <div class="text-slate-400 font-semibold" x-text="t('ab_test_no_tests')"></div>
        </div>
      </div>

      <!-- Create A/B Test Modal -->
      <div x-show="abTestModalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50" @click.self="abTestModalOpen = false">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-lg shadow-2xl">
          <h2 class="text-lg font-bold text-white mb-5" x-text="t('ab_test_create')"></h2>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5" x-text="t('ab_test_video_id')"></label>
              <select x-model="abTestForm.video_id" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-purple-500">
                <option value="">--</option>
                <template x-for="s in sessions.filter(s => s.status === 'completed')" :key="s.id">
                  <option :value="s.id" x-text="(s.topic || s.id).substring(0, 60)"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5" x-text="t('ab_test_variant') + 's'"></label>
              <div class="space-y-2">
                <template x-for="(v, idx) in abTestForm.variants" :key="idx">
                  <div class="flex gap-2">
                    <input type="text" :value="v" @input="abTestForm.variants[idx] = $event.target.value"
                           class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-purple-500"
                           :placeholder="t('ab_test_variant_placeholder')">
                    <button x-show="abTestForm.variants.length > 2" @click="removeAbVariant(idx)"
                            class="px-2 text-red-400 hover:text-red-300 text-lg font-bold">x</button>
                  </div>
                </template>
              </div>
              <button @click="addAbVariant()" class="mt-2 text-xs text-purple-400 hover:text-purple-300 font-bold" x-text="'+ ' + t('ab_test_add_variant')"></button>
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button @click="abTestModalOpen = false" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition-colors">Cancel</button>
            <button @click="createAbTest()" class="px-5 py-2 bg-purple-600 hover:bg-purple-500 text-white text-sm font-bold rounded-xl transition-all" x-text="t('ab_test_create')"></button>
          </div>
        </div>
      </div>
    </div>
