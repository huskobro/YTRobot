{# View: api-keys #}
    <div x-show="view==='api-keys'" x-data="{ keyTests: {} }" class="p-6">
      <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold text-white" x-text="t('nav_api_keys')"></h1>
            <p class="text-slate-500 text-sm mt-0.5" x-text="t('api_keys_subtitle')"></p>
          </div>
          <button @click="handleSaveSettings()" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold rounded-xl shadow-md shadow-indigo-900/30 transition-all"
                  x-text="t('save_settings')"></button>
        </div>
        <div x-show="settingsSaved" x-transition class="mb-4 px-4 py-3 bg-green-900/30 border border-green-700/50 rounded-xl text-sm text-green-400 flex items-center gap-2"
             x-text="t('settings_saved')"></div>

        <!-- Helper: key row template rendered inline per key -->
        <!-- AI / LLM Keys -->
        <div class="bg-slate-900 border border-indigo-900/30 rounded-2xl p-6 mb-4 shadow-lg shadow-indigo-950/10">
          <div class="flex items-center gap-2 mb-5">
            <div class="w-8 h-8 bg-indigo-600/15 rounded-lg flex items-center justify-center text-indigo-400 text-lg">🧠</div>
            <h2 class="text-sm font-black text-white uppercase tracking-wider" x-text="t('api_keys_ai_section')"></h2>
          </div>
          <div class="space-y-4">

            <!-- kie.ai -->
            <div>
              <label class="block text-xs font-semibold text-slate-400 mb-1.5" x-text="t('kieai_key')"></label>
              <div class="flex gap-2">
                <input x-model="settings.KIEAI_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" placeholder="kieai-..." />
                <button @click="testApiKey('kieai', keyTests, $event)" :disabled="keyTests.kieai==='loading'"
                        class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                        :class="keyTests.kieai==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.kieai==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                        x-text="keyTests.kieai==='loading'?'...':keyTests.kieai==='ok'?'✓ OK':keyTests.kieai==='error'?'✗ Hata':t('api_key_test_btn')"></button>
              </div>
              <div x-show="keyTests.kieai_msg" class="mt-1 text-xs" :class="keyTests.kieai==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.kieai_msg"></div>
              <p class="text-xs text-slate-600 mt-1">Gemini 2.5 Flash — Script, autofill, sosyal medya meta için birincil AI</p>
            </div>

            <!-- Gemini direct -->
            <div>
              <label class="block text-xs font-semibold text-slate-400 mb-1.5">Gemini API Key <span class="text-slate-500 font-normal">(doğrudan yedek)</span></label>
              <div class="flex gap-2">
                <input x-model="settings.GEMINI_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" placeholder="AIza..." />
                <button @click="testApiKey('gemini', keyTests, $event)" :disabled="keyTests.gemini==='loading'"
                        class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                        :class="keyTests.gemini==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.gemini==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                        x-text="keyTests.gemini==='loading'?'...':keyTests.gemini==='ok'?'✓ OK':keyTests.gemini==='error'?'✗ Hata':t('api_key_test_btn')"></button>
              </div>
              <div x-show="keyTests.gemini_msg" class="mt-1 text-xs" :class="keyTests.gemini==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.gemini_msg"></div>
            </div>

            <!-- OpenAI + Anthropic -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5" x-text="t('openai_key')"></label>
                <div class="flex gap-2">
                  <input x-model="settings.OPENAI_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" />
                  <button @click="testApiKey('openai', keyTests, $event)" :disabled="keyTests.openai==='loading'"
                          class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                          :class="keyTests.openai==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.openai==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                          x-text="keyTests.openai==='loading'?'...':keyTests.openai==='ok'?'✓ OK':keyTests.openai==='error'?'✗':t('api_key_test_btn')"></button>
                </div>
                <div x-show="keyTests.openai_msg" class="mt-1 text-xs" :class="keyTests.openai==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.openai_msg"></div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5" x-text="t('anthropic_key')"></label>
                <div class="flex gap-2">
                  <input x-model="settings.ANTHROPIC_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" />
                  <button @click="testApiKey('anthropic', keyTests, $event)" :disabled="keyTests.anthropic==='loading'"
                          class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                          :class="keyTests.anthropic==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.anthropic==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                          x-text="keyTests.anthropic==='loading'?'...':keyTests.anthropic==='ok'?'✓ OK':keyTests.anthropic==='error'?'✗':t('api_key_test_btn')"></button>
                </div>
                <div x-show="keyTests.anthropic_msg" class="mt-1 text-xs" :class="keyTests.anthropic==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.anthropic_msg"></div>
              </div>
            </div>

          </div>
        </div>

        <!-- TTS Keys -->
        <div class="bg-slate-900 border border-cyan-900/30 rounded-2xl p-6 mb-4 shadow-lg shadow-cyan-950/10">
          <div class="flex items-center gap-2 mb-5">
            <div class="w-8 h-8 bg-cyan-600/15 rounded-lg flex items-center justify-center text-cyan-400 text-lg">🔊</div>
            <h2 class="text-sm font-black text-white uppercase tracking-wider" x-text="t('api_keys_tts_section')"></h2>
          </div>
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5" x-text="t('spesh_key')"></label>
                <div class="flex gap-2">
                  <input x-model="settings.SPESHAUDIO_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" />
                  <button @click="testApiKey('speshaudio', keyTests, $event)" :disabled="keyTests.speshaudio==='loading'"
                          class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                          :class="keyTests.speshaudio==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.speshaudio==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                          x-text="keyTests.speshaudio==='loading'?'...':keyTests.speshaudio==='ok'?'✓ OK':keyTests.speshaudio==='error'?'✗':t('api_key_test_btn')"></button>
                </div>
                <div x-show="keyTests.speshaudio_msg" class="mt-1 text-xs" :class="keyTests.speshaudio==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.speshaudio_msg"></div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5" x-text="t('elevenlabs_key')"></label>
                <div class="flex gap-2">
                  <input x-model="settings.ELEVENLABS_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" />
                  <button @click="testApiKey('elevenlabs', keyTests, $event)" :disabled="keyTests.elevenlabs==='loading'"
                          class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                          :class="keyTests.elevenlabs==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.elevenlabs==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                          x-text="keyTests.elevenlabs==='loading'?'...':keyTests.elevenlabs==='ok'?'✓ OK':keyTests.elevenlabs==='error'?'✗':t('api_key_test_btn')"></button>
                </div>
                <div x-show="keyTests.elevenlabs_msg" class="mt-1 text-xs" :class="keyTests.elevenlabs==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.elevenlabs_msg"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Visuals Keys -->
        <div class="bg-slate-900 border border-purple-900/30 rounded-2xl p-6 mb-4 shadow-lg shadow-purple-950/10">
          <div class="flex items-center gap-2 mb-5">
            <div class="w-8 h-8 bg-purple-600/15 rounded-lg flex items-center justify-center text-purple-400 text-lg">🎨</div>
            <h2 class="text-sm font-black text-white uppercase tracking-wider" x-text="t('api_keys_visuals_section')"></h2>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold text-slate-400 mb-1.5" x-text="t('pexels_key')"></label>
              <div class="flex gap-2">
                <input x-model="settings.PEXELS_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" />
                <button @click="testApiKey('pexels', keyTests, $event)" :disabled="keyTests.pexels==='loading'"
                        class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                        :class="keyTests.pexels==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.pexels==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                        x-text="keyTests.pexels==='loading'?'...':keyTests.pexels==='ok'?'✓ OK':keyTests.pexels==='error'?'✗':t('api_key_test_btn')"></button>
              </div>
              <div x-show="keyTests.pexels_msg" class="mt-1 text-xs" :class="keyTests.pexels==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.pexels_msg"></div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-400 mb-1.5" x-text="t('pixabay_key')"></label>
              <div class="flex gap-2">
                <input x-model="settings.PIXABAY_API_KEY" type="password" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono transition-colors" />
                <button @click="testApiKey('pixabay', keyTests, $event)" :disabled="keyTests.pixabay==='loading'"
                        class="shrink-0 px-3 py-2 text-xs font-semibold rounded-lg border transition-all"
                        :class="keyTests.pixabay==='ok'?'bg-green-900/40 border-green-600 text-green-400':keyTests.pixabay==='error'?'bg-red-900/40 border-red-600 text-red-400':'bg-slate-800 border-slate-600 text-slate-300 hover:border-slate-400'"
                        x-text="keyTests.pixabay==='loading'?'...':keyTests.pixabay==='ok'?'✓ OK':keyTests.pixabay==='error'?'✗':t('api_key_test_btn')"></button>
              </div>
              <div x-show="keyTests.pixabay_msg" class="mt-1 text-xs" :class="keyTests.pixabay==='ok'?'text-green-400':'text-red-400'" x-text="keyTests.pixabay_msg"></div>
            </div>
          </div>
        </div>

        <!-- Social Media Keys -->
        <div class="bg-slate-900 border border-violet-900/30 rounded-2xl p-6 mb-4 shadow-lg shadow-violet-950/10">
          <div class="flex items-center gap-2 mb-5">
            <div class="w-8 h-8 bg-violet-600/15 rounded-lg flex items-center justify-center text-violet-400 text-lg">📱</div>
            <h2 class="text-sm font-black text-white uppercase tracking-wider">Sosyal Medya Dağıtım (API)</h2>
          </div>
          <div class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5">YouTube OAuth Client ID</label>
                <input x-model="settings.YT_CLIENT_ID" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-violet-500 font-mono" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5">YouTube Client Secret</label>
                <input x-model="settings.YT_CLIENT_SECRET" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-violet-500 font-mono" />
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5">Instagram Access Token</label>
                <input x-model="settings.INSTAGRAM_ACCESS_TOKEN" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-violet-500 font-mono" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5">TikTok Client Key</label>
                <input x-model="settings.TIKTOK_CLIENT_KEY" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-violet-500 font-mono" />
              </div>
            </div>
          </div>
        </div>

        <!-- Save reminder -->
        <p class="text-xs text-slate-600 text-center mt-2" x-text="t('api_keys_save_note')"></p>
      </div>
    </div>
