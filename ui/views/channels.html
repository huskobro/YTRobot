{# View: channels #}
    <div x-show="view==='channels'" class="p-6">
      <div class="max-w-5xl mx-auto">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-black text-white tracking-tight" x-text="t('channels_title')"></h1>
            <p class="text-slate-500 text-sm mt-1">Kanallarınızı yönetin, aktif kanalı seçin.</p>
          </div>
          <button @click="openChannelForm()"
                  class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all flex items-center gap-2 shadow-lg shadow-blue-900/30">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span x-text="t('channel_create')"></span>
          </button>
        </div>

        <!-- Loading -->
        <div x-show="channelsLoading" class="flex items-center justify-center py-16">
          <svg class="w-8 h-8 text-blue-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </div>

        <!-- Channel Cards Grid -->
        <div x-show="!channelsLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

          <!-- Default Channel Card -->
          <div class="bg-gray-800 rounded-xl p-6 border transition-all"
               :class="activeChannelId === '_default' ? 'border-blue-500 ring-2 ring-blue-500/20' : 'border-gray-700 hover:border-gray-600'">
            <div class="flex items-start justify-between mb-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-slate-700 flex items-center justify-center text-xl">📺</div>
                <div>
                  <div class="font-bold text-white text-sm">Varsayılan Kanal</div>
                  <div class="text-xs text-slate-500 mt-0.5">Sistem varsayılanı</div>
                </div>
              </div>
              <div x-show="activeChannelId === '_default'" class="flex items-center gap-1.5 px-2 py-1 bg-green-900/40 border border-green-700/50 rounded-lg">
                <div class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
                <span class="text-[10px] font-bold text-green-400" x-text="t('channel_active')"></span>
              </div>
            </div>
            <div class="flex items-center gap-2 mb-4">
              <span class="text-[10px] px-2 py-0.5 bg-slate-700 text-slate-300 rounded-md border border-slate-600 font-mono uppercase">TR</span>
              <span class="text-[10px] px-2 py-0.5 bg-red-900/30 text-red-400 rounded-md border border-red-800/50 font-mono">YT</span>
            </div>
            <div class="flex gap-2">
              <button x-show="activeChannelId !== '_default'"
                      @click="setActiveChannel('_default')"
                      class="flex-1 py-2 bg-slate-700 hover:bg-blue-600 text-slate-300 hover:text-white text-xs font-bold rounded-lg transition-all"
                      x-text="t('channel_set_active')"></button>
              <div x-show="activeChannelId === '_default'" class="flex-1 py-2 text-center text-xs text-green-400 font-bold">✓ Aktif</div>
              <button @click="launchChannelWizard('_default')"
                      class="px-3 py-2 bg-purple-900/40 hover:bg-purple-700 text-purple-400 hover:text-white text-xs font-bold rounded-lg transition-all border border-purple-800/40"
                      :title="lang==='tr' ? 'Wizard ile tüm ayarları düzenle' : 'Edit all settings with wizard'">
                🧙
              </button>
            </div>
          </div>

          <!-- Custom Channel Cards -->
          <template x-for="ch in channelsData" :key="ch.id">
            <div class="bg-gray-800 rounded-xl p-6 border transition-all"
                 :class="activeChannelId === ch.id ? 'border-blue-500 ring-2 ring-blue-500/20' : 'border-gray-700 hover:border-gray-600'">
              <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl"
                       :style="ch.branding?.color_primary ? `background:${ch.branding.color_primary}22; border: 1px solid ${ch.branding.color_primary}44` : 'background:#334155'">
                    <span x-text="ch.name?.charAt(0)?.toUpperCase() || '📺'" class="font-black text-white text-base"></span>
                  </div>
                  <div>
                    <div class="font-bold text-white text-sm" x-text="ch.name"></div>
                    <div class="text-xs text-slate-500 mt-0.5" x-text="ch.preset_name || 'Özel kanal'"></div>
                  </div>
                </div>
                <div x-show="activeChannelId === ch.id" class="flex items-center gap-1.5 px-2 py-1 bg-green-900/40 border border-green-700/50 rounded-lg shrink-0">
                  <div class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
                  <span class="text-[10px] font-bold text-green-400" x-text="t('channel_active')"></span>
                </div>
              </div>

              <div class="flex items-center gap-2 mb-4">
                <span class="text-[10px] px-2 py-0.5 bg-slate-700 text-slate-300 rounded-md border border-slate-600 font-mono uppercase" x-text="(ch.language || 'tr').toUpperCase()"></span>
                <span class="text-[10px] px-2 py-0.5 bg-red-900/30 text-red-400 rounded-md border border-red-800/50 font-mono">YT</span>
                <span x-show="ch.default_category" class="text-[10px] px-2 py-0.5 bg-indigo-900/30 text-indigo-400 rounded-md border border-indigo-800/50 font-mono" x-text="ch.default_category"></span>
              </div>

              <div class="flex gap-2 mt-auto">
                <button x-show="activeChannelId !== ch.id"
                        @click="setActiveChannel(ch.id)"
                        class="flex-1 py-2 bg-slate-700 hover:bg-blue-600 text-slate-300 hover:text-white text-xs font-bold rounded-lg transition-all"
                        x-text="t('channel_set_active')"></button>
                <div x-show="activeChannelId === ch.id" class="flex-1 py-2 text-center text-xs text-green-400 font-bold">✓ Aktif</div>
                <button @click="openChannelForm(ch)"
                        class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white text-xs font-bold rounded-lg transition-all"
                        title="Düzenle">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                </button>
                <button @click="launchChannelWizard(ch.id)"
                        class="px-3 py-2 bg-purple-900/40 hover:bg-purple-700 text-purple-400 hover:text-white text-xs font-bold rounded-lg transition-all border border-purple-800/40"
                        :title="lang==='tr' ? 'Wizard ile tüm ayarları düzenle' : 'Edit all settings with wizard'">
                  🧙
                </button>
                <button @click="deleteChannel(ch.id)"
                        class="px-3 py-2 bg-red-900/30 hover:bg-red-700 text-red-400 hover:text-white text-xs font-bold rounded-lg transition-all border border-red-800/40"
                        title="Sil">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </div>
            </div>
          </template>

          <!-- Empty State -->
          <div x-show="channelsData.length === 0 && !channelsLoading"
               class="col-span-full flex flex-col items-center justify-center py-16 text-center">
            <div class="text-5xl mb-4">📺</div>
            <div class="text-slate-400 font-semibold mb-1">Henüz özel kanal yok</div>
            <div class="text-slate-600 text-sm mb-6">Farklı içerik stratejileri için yeni kanallar oluşturun.</div>
            <button @click="openChannelForm()"
                    class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all"
                    x-text="t('channel_create')"></button>
          </div>
        </div>

      </div>
    </div>

    <!-- Channel Form Modal -->
    <div x-show="channelFormOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
         @click.self="channelFormOpen = false"
         style="display:none;" x-cloak>
      <div class="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl shadow-2xl shadow-black/60 max-h-[90vh] flex flex-col"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100">

        <!-- Modal Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700 shrink-0">
          <h2 class="text-lg font-bold text-white" x-text="channelEditId ? t('channel_edit') : t('channel_create')"></h2>
          <button @click="channelFormOpen = false" class="text-slate-400 hover:text-white transition-colors text-xl leading-none">✕</button>
        </div>

        <!-- Modal Body -->
        <div class="p-6 overflow-y-auto flex-1 space-y-5">

          <!-- Name -->
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2" x-text="t('channel_name')"></label>
            <input type="text" x-model="channelForm.name"
                   class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition-all"
                   placeholder="Kanalın adı...">
          </div>

          <!-- Language -->
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2" x-text="t('channel_language')"></label>
            <select x-model="channelForm.language"
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 appearance-none transition-all">
              <option value="tr">Türkçe (TR)</option>
              <option value="en">English (EN)</option>
              <option value="de">Deutsch (DE)</option>
              <option value="fr">Français (FR)</option>
              <option value="es">Español (ES)</option>
              <option value="pt">Português (PT)</option>
            </select>
          </div>

          <!-- Master Prompt -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="t('channel_master_prompt')"></label>
              <div class="flex items-center gap-2">
                <select @change="applyMasterPromptTemplate($event.target.value); $event.target.value = ''"
                        class="bg-slate-800 border border-slate-700 rounded-lg px-2 py-1 text-[10px] text-slate-400 focus:outline-none">
                  <option value="" x-text="lang === 'tr' ? 'Template seç...' : 'Choose template...'"></option>
                  <option value="educational" x-text="lang === 'tr' ? 'Eğitim Kanalı' : 'Educational'"></option>
                  <option value="entertainment" x-text="lang === 'tr' ? 'Eğlence Kanalı' : 'Entertainment'"></option>
                  <option value="news" x-text="lang === 'tr' ? 'Haber Kanalı' : 'News Channel'"></option>
                  <option value="tech" x-text="lang === 'tr' ? 'Teknoloji İnceleme' : 'Tech Review'"></option>
                </select>
                <button @click="(async () => {
                  if(!channelForm.master_prompt.trim()) { showWarning(lang==='tr' ? 'Önce bir prompt yazın' : 'Write a prompt first'); return; }
                  const res = await apiFetch('/api/ai/assist', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({field:'test_prompt', value: channelForm.master_prompt.substring(0,500) + '\\n\\nBu prompt ile kısa bir örnek paragraf yaz (2-3 cümle).'}) });
                  if(res?.result) showToast(res.result, 'info', 8000);
                })()"
                        class="px-2 py-1 bg-violet-900/40 border border-violet-800/40 rounded-lg text-violet-400 text-[10px] font-bold hover:bg-violet-800/40 transition-all"
                        x-text="lang === 'tr' ? 'Test Et' : 'Test'"></button>
              </div>
            </div>
            <textarea x-model="channelForm.master_prompt" rows="8"
                      class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition-all resize-y font-mono leading-relaxed"
                      :placeholder="lang === 'tr' ? 'Bu kanalın AI tonu, stili ve kuralları...\n\nÖrnek:\nSen {kanal} kanalı için içerik üreten bir AI asistanısın.\n\n## Stil\n- Samimi ama profesyonel dil\n- Kısa cümleler, net anlatım\n\n## Ton\n- Arkadaş gibi konuş' : 'AI tone, style and rules for this channel...'"></textarea>
            <p class="text-[9px] text-slate-600 mt-1" x-text="lang === 'tr' ? 'Bu prompt, bu kanal için üretilen tüm scriptlerde system prompt olarak kullanılır.' : 'This prompt is used as the system prompt for all scripts generated for this channel.'"></p>
          </div>

          <!-- Default Category + Preset -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2" x-text="t('channel_default_category')"></label>
              <select x-model="channelForm.default_category"
                      class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 appearance-none transition-all">
                <option value="general">Genel</option>
                <option value="education">Eğitim</option>
                <option value="entertainment">Eğlence</option>
                <option value="news">Haber</option>
                <option value="science_tech">Bilim & Teknoloji</option>
                <option value="history_mystery">Tarih & Gizem</option>
                <option value="motivation">Motivasyon</option>
                <option value="documentary">Belgesel</option>
                <option value="true_crime">Gerçek Suç</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Preset Adı</label>
              <input type="text" x-model="channelForm.preset_name"
                     class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition-all"
                     placeholder="örn: haber_tr_v1">
            </div>
          </div>

          <!-- Branding -->
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3" x-text="t('channel_branding')"></label>
            <div class="bg-slate-950/50 border border-slate-800 rounded-xl p-4 space-y-4">

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2" x-text="t('channel_color_primary')"></label>
                  <div class="flex items-center gap-3">
                    <input type="color" x-model="channelForm.branding.color_primary"
                           class="w-10 h-10 rounded-lg border border-slate-700 bg-transparent cursor-pointer">
                    <input type="text" x-model="channelForm.branding.color_primary"
                           class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white font-mono focus:outline-none focus:border-blue-500">
                  </div>
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">İkincil Renk</label>
                  <div class="flex items-center gap-3">
                    <input type="color" x-model="channelForm.branding.color_secondary"
                           class="w-10 h-10 rounded-lg border border-slate-700 bg-transparent cursor-pointer">
                    <input type="text" x-model="channelForm.branding.color_secondary"
                           class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white font-mono focus:outline-none focus:border-blue-500">
                  </div>
                </div>
              </div>

              <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2" x-text="t('channel_thumbnail_template')"></label>
                <select x-model="channelForm.branding.thumbnail_template"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500 appearance-none">
                  <option value="classic">Classic</option>
                  <option value="modern">Modern</option>
                  <option value="minimal">Minimal</option>
                  <option value="bold">Bold</option>
                  <option value="cinematic">Cinematic</option>
                </select>
              </div>

            </div>
          </div>

        </div>

        <!-- Modal Footer -->
        <div class="px-6 py-4 border-t border-gray-700 shrink-0 flex gap-3 justify-end">
          <button @click="channelFormOpen = false"
                  class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl transition-all text-sm">
            İptal
          </button>
          <button @click="saveChannel()" :disabled="!channelForm.name.trim()"
                  class="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-all text-sm shadow-lg shadow-blue-900/30 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Kaydet
          </button>
        </div>

      </div>
    </div>
