{# View: dashboard #}
    <div x-show="view==='dashboard'" class="p-6">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-white" x-text="t('dashboard_title')"></h1>
          <p class="text-slate-500 text-sm mt-0.5" x-text="t('dashboard_subtitle')"></p>
        </div>
        <button @click="view='new-run';mode='topic';runError=''"
                class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg shadow-md shadow-indigo-900/30 transition-all">
          <span x-text="t('dashboard_new_video')"></span>
        </button>
      </div>

      <!-- ── Analytics Widgets ──────────────────────────────────────────── -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-6">

        <!-- A) Active Channel Card -->
        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Aktif Kanal</h3>
            <span class="text-xs px-2 py-1 bg-green-900/40 text-green-400 rounded-lg border border-green-700/50" x-text="activeChannelName || 'Varsayılan'"></span>
          </div>
          <div class="grid grid-cols-3 gap-3 mt-3">
            <div class="text-center"><div class="text-2xl font-black text-white" x-text="dashboardStats.totalRenders || 0"></div><div class="text-[10px] text-slate-500 uppercase">Toplam</div></div>
            <div class="text-center"><div class="text-2xl font-black text-green-400" x-text="dashboardStats.successCount || 0"></div><div class="text-[10px] text-slate-500 uppercase">Başarılı</div></div>
            <div class="text-center"><div class="text-2xl font-black text-red-400" x-text="dashboardStats.failCount || 0"></div><div class="text-[10px] text-slate-500 uppercase">Başarısız</div></div>
          </div>
        </div>

        <!-- B) Queue Status -->
        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700">
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Kuyruk Durumu</h3>
          <div class="grid grid-cols-2 gap-3">
            <div class="text-center"><div class="text-2xl font-black text-blue-400" x-text="queueStatus?.running_count || 0"></div><div class="text-[10px] text-slate-500 uppercase">Çalışan</div></div>
            <div class="text-center"><div class="text-2xl font-black text-yellow-400" x-text="(queueStatus?.queued || []).length"></div><div class="text-[10px] text-slate-500 uppercase">Sırada</div></div>
          </div>
        </div>

        <!-- C) Recent Activity (full width) -->
        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 md:col-span-2 xl:col-span-1">
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Son Aktivite</h3>
          <div class="space-y-2" x-show="recentActivity.length > 0">
            <template x-for="act in recentActivity" :key="act.session_id || act.ts">
              <div class="flex items-center gap-3 py-2 border-b border-gray-700/50 last:border-0">
                <div class="w-2 h-2 rounded-full shrink-0" :class="act.status === 'completed' ? 'bg-green-400' : act.status === 'failed' ? 'bg-red-400' : 'bg-yellow-400'"></div>
                <div class="flex-1 text-sm text-slate-300 truncate" x-text="act.session_id || act.module || 'Video'"></div>
                <div class="text-xs text-slate-500" x-text="act.module || ''"></div>
                <div class="text-xs text-slate-600" x-text="act.duration ? (act.duration.toFixed(0) + 's') : ''"></div>
              </div>
            </template>
          </div>
          <div x-show="recentActivity.length === 0" class="text-sm text-slate-600 text-center py-4">Henüz aktivite yok</div>
        </div>

      </div>

      <!-- ── Lifecycle Widgets (FAZ 3) ─────────────────────────────────── -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

        <!-- D) This Week Summary -->
        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700">
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3" x-text="t('dashboard_this_week') || 'Bu Hafta'"></h3>
          <div class="grid grid-cols-4 gap-3">
            <div class="text-center">
              <div class="text-2xl font-black text-white" x-text="dashboardSummary.week?.total || 0"></div>
              <div class="text-[10px] text-slate-500 uppercase" x-text="t('dashboard_week_total') || 'Toplam'"></div>
            </div>
            <div class="text-center">
              <div class="text-2xl font-black text-green-400" x-text="dashboardSummary.week?.completed || 0"></div>
              <div class="text-[10px] text-slate-500 uppercase" x-text="t('dashboard_week_completed') || 'Tamamlanan'"></div>
            </div>
            <div class="text-center">
              <div class="text-2xl font-black text-red-400" x-text="dashboardSummary.week?.failed || 0"></div>
              <div class="text-[10px] text-slate-500 uppercase" x-text="t('dashboard_week_failed') || 'Başarısız'"></div>
            </div>
            <div class="text-center">
              <div class="text-2xl font-black text-blue-400" x-text="dashboardSummary.week?.running || 0"></div>
              <div class="text-[10px] text-slate-500 uppercase" x-text="t('dashboard_week_active') || 'Aktif'"></div>
            </div>
          </div>
          <!-- Channel breakdown -->
          <div x-show="(dashboardSummary.channels || []).length > 1" class="mt-4 pt-3 border-t border-gray-700/50">
            <div class="text-[10px] text-slate-500 uppercase mb-2" x-text="t('dashboard_by_channel') || 'Kanallara Göre'"></div>
            <div class="space-y-1.5">
              <template x-for="ch in (dashboardSummary.channels || [])" :key="ch.id">
                <div class="flex items-center justify-between text-xs">
                  <span class="text-slate-300 truncate" x-text="ch.name"></span>
                  <span class="flex gap-2 text-slate-500">
                    <span x-text="ch.completed + ' ✓'" class="text-green-500"></span>
                    <span x-show="ch.failed > 0" x-text="ch.failed + ' ✗'" class="text-red-500"></span>
                    <span class="text-slate-600" x-text="ch.total + ' toplam'"></span>
                  </span>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- E) Upcoming Calendar -->
        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="t('dashboard_upcoming') || 'Yaklaşan İçerikler'"></h3>
            <button @click="view='content-planning'" class="text-[10px] text-indigo-400 hover:text-indigo-300 transition-colors" x-text="t('dashboard_view_calendar') || 'Takvime Git →'"></button>
          </div>
          <div class="space-y-2" x-show="(dashboardSummary.upcoming_calendar || []).length > 0">
            <template x-for="item in (dashboardSummary.upcoming_calendar || [])" :key="item.id">
              <div class="flex items-center gap-3 py-2 border-b border-gray-700/50 last:border-0">
                <div class="shrink-0 text-xs px-2 py-1 rounded-md font-mono"
                     :class="item.status === 'idea' ? 'bg-slate-700 text-slate-400' :
                             item.status === 'planned' ? 'bg-blue-900/40 text-blue-400 border border-blue-700/50' :
                             item.status === 'in_progress' ? 'bg-yellow-900/40 text-yellow-400 border border-yellow-700/50' :
                             'bg-green-900/40 text-green-400 border border-green-700/50'"
                     x-text="item.planned_date ? item.planned_date.slice(5) : '—'"></div>
                <div class="flex-1 min-w-0">
                  <div class="text-sm text-slate-300 truncate" x-text="item.title"></div>
                  <div class="text-[10px] text-slate-600" x-text="item.topic || ''"></div>
                </div>
                <button x-show="!item.session_id && item.topic"
                        @click.stop="produceFromCalendar(item.id)"
                        class="shrink-0 px-2 py-1 text-[10px] rounded-md bg-indigo-900/30 border border-indigo-700/40 text-indigo-400 hover:bg-indigo-900/60 transition-all"
                        x-text="t('dashboard_produce') || 'Üret'"></button>
                <span x-show="item.session_id" class="shrink-0 text-[10px] text-green-500">✓ Bağlı</span>
              </div>
            </template>
          </div>
          <div x-show="(dashboardSummary.upcoming_calendar || []).length === 0"
               class="text-sm text-slate-600 text-center py-6">
            <div class="text-2xl mb-2">📅</div>
            <span x-text="t('dashboard_no_upcoming') || 'Yaklaşan içerik yok'"></span>
          </div>
        </div>

      </div>
      <!-- ─────────────────────────────────────────────────────────────── -->

      <!-- Filter bar -->
      <div x-show="sessions.length>0" class="space-y-2 mb-5">
        <!-- Status filters -->
        <div class="flex gap-2 flex-wrap">
          <template x-for="f in ['all','running','queued','paused','completed','failed','stopped']" :key="f">
            <button @click="filter=f"
                    class="px-3 py-1.5 text-xs font-semibold rounded-lg border transition-all"
                    :class="filter===f ? 'bg-indigo-600 text-white border-indigo-500 shadow-sm shadow-indigo-900/40' : 'text-slate-400 border-slate-700 hover:border-slate-500 hover:text-slate-200'"
                    x-text="t('filter_'+f)"></button>
          </template>
          <span class="ml-auto text-xs text-slate-600 self-center" x-text="filteredSessions().length+' / '+sessions.length"></span>
        </div>
        <!-- Module filters -->
        <div class="flex gap-2 flex-wrap">
          <span class="text-xs text-slate-600 self-center mr-1" x-text="t('filter_module_label')"></span>
          <button @click="dashboardModuleFilter='all'"
                  class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
                  :class="dashboardModuleFilter==='all' ? 'bg-slate-600 text-white border-slate-500' : 'text-slate-500 border-slate-700 hover:border-slate-500 hover:text-slate-300'"
                  x-text="t('filter_module_all')"></button>
          <button @click="dashboardModuleFilter='yt_video'"
                  class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
                  :class="dashboardModuleFilter==='yt_video' ? 'bg-indigo-600 text-white border-indigo-500' : 'text-slate-500 border-slate-700 hover:border-indigo-500/50 hover:text-indigo-300'">
            ▶ <span x-text="t('filter_module_yt_video')"></span>
          </button>
          <button @click="dashboardModuleFilter='bulletin'"
                  class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
                  :class="dashboardModuleFilter==='bulletin' ? 'bg-red-700 text-white border-red-600' : 'text-slate-500 border-slate-700 hover:border-red-600/50 hover:text-red-400'">
            📺 <span x-text="t('filter_module_bulletin')"></span>
          </button>
          <button @click="dashboardModuleFilter='product_review'"
                  class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
                  :class="dashboardModuleFilter==='product_review' ? 'bg-amber-600 text-white border-amber-500' : 'text-slate-500 border-slate-700 hover:border-amber-500/50 hover:text-amber-400'">
            🛒 <span x-text="t('filter_module_product_review')"></span>
          </button>
        </div>
        <!-- Channel filters -->
        <div class="flex gap-2 flex-wrap" x-show="channelsData.length > 1">
          <span class="text-xs text-slate-600 self-center mr-1">Kanal:</span>
          <button @click="dashboardChannelFilter='all'; loadSessions()"
                  class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
                  :class="dashboardChannelFilter==='all' ? 'bg-cyan-600 text-white border-cyan-500' : 'text-slate-500 border-slate-700 hover:border-cyan-500/50 hover:text-cyan-300'">
            Tümü
          </button>
          <template x-for="ch in channelsData" :key="ch.id">
            <button @click="dashboardChannelFilter=ch.id; loadSessions()"
                    class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
                    :class="dashboardChannelFilter===ch.id ? 'bg-cyan-600 text-white border-cyan-500' : 'text-slate-500 border-slate-700 hover:border-cyan-500/50 hover:text-cyan-300'"
                    x-text="ch.name || ch.id"></button>
          </template>
        </div>
      </div>

      <!-- Empty -->
      <div x-show="sessions.length===0" class="flex flex-col items-center justify-center py-32 text-center">
        <div class="text-6xl mb-4">🎬</div>
        <div class="text-xl font-semibold text-white mb-2" x-text="t('empty_title')"></div>
        <div class="text-slate-500 text-sm mb-6" x-text="t('empty_subtitle')"></div>
        <button @click="view='new-run';mode='topic'"
                class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-lg transition-all"
                x-text="t('empty_cta')"></button>
      </div>

      <!-- Empty filter result -->
      <div x-show="sessions.length>0 && filteredSessions().length===0" class="flex flex-col items-center justify-center py-20 text-center">
        <div class="text-4xl mb-3">🔍</div>
        <div class="text-slate-500 text-sm">No sessions match the current filter</div>
      </div>

      <!-- Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <template x-for="session in filteredSessions()" :key="session.id">
          <div @click="openSession(session)"
               class="bg-slate-900 border border-slate-800 rounded-xl p-5 cursor-pointer hover:border-slate-600 hover:bg-slate-800/60 transition-all group relative overflow-hidden">
            <div x-show="session.status==='running'" class="absolute inset-0 bg-blue-500/5 pointer-events-none"></div>
            <div x-show="session.status==='paused'" class="absolute inset-0 bg-purple-500/5 pointer-events-none"></div>
            <div class="flex items-start justify-between mb-3">
              <div class="flex items-center gap-1.5 flex-wrap">
                <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border" :class="statusBadge(session.status)"
                      x-text="t('status_'+session.status) || session.status.toUpperCase()"></span>
                <span class="px-2 py-0.5 rounded-full text-xs font-semibold border"
                      :class="moduleBadge(session.module||'yt_video').css"
                      x-text="moduleBadge(session.module||'yt_video').label"></span>
              </div>
              <span class="text-xs text-slate-600 font-mono" x-text="formatDate(session.started_at)"></span>
            </div>
            <div class="font-semibold text-white mb-0.5 line-clamp-2 group-hover:text-indigo-300 transition-colors text-sm"
                 x-text="session.topic||session.id"></div>
            <div class="flex items-center gap-2 mb-3">
              <span class="text-xs text-slate-600 font-mono" x-text="session.id"></span>
              <span x-show="session.preset_name" class="text-xs px-2 py-0.5 bg-indigo-900/40 border border-indigo-700/50 text-indigo-400 rounded-full font-medium" x-text="session.preset_name"></span>
              <span x-show="session.channel_name && session.channel_id !== '_default'" class="text-xs px-2 py-0.5 bg-cyan-900/30 border border-cyan-700/40 text-cyan-400 rounded-full font-medium" x-text="session.channel_name"></span>
            </div>
            <!-- Mini step track -->
            <div class="flex gap-1 mb-3">
              <template x-for="(step,i) in (session.steps||[])" :key="i">
                <div class="flex-1 h-1.5 rounded-full transition-all"
                     :class="step.status==='completed'?'bg-green-500':step.status==='running'?'bg-blue-500 animate-pulse':step.status==='failed'?'bg-red-500':'bg-slate-700'"></div>
              </template>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs text-slate-500">
                <span x-text="(session.steps||[]).filter(s=>s.status==='completed').length"></span>/6 <span x-text="t('steps_label')"></span>
              </span>
              <span x-show="session.status==='running'" class="text-xs text-blue-400">↻ <span x-text="(session.steps||[])[session.current_step]?.name||'...'"></span></span>
              <span x-show="session.status==='completed'" class="text-xs text-green-400">✓ <span x-text="t('status_completed')"></span></span>
              <span x-show="session.status==='queued'" class="text-xs text-yellow-400">⏳ <span x-text="t('status_queued')"></span></span>
              <span x-show="session.status==='paused'" class="text-xs text-purple-400">⏸ <span x-text="t('status_paused')"></span></span>
              <span x-show="session.status==='stopped'" class="text-xs text-orange-400">⏹ <span x-text="t('status_stopped')"></span></span>
            </div>
            <div x-show="session.error" class="mt-2.5 px-2.5 py-1.5 bg-red-900/30 border border-red-800/50 rounded-lg text-xs text-red-400 line-clamp-2" x-text="session.error"></div>
            <div x-show="session.notes&&session.notes.trim()" class="mt-2 text-xs text-slate-500 flex items-center gap-1">
              <span>📝</span><span class="truncate" x-text="session.notes"></span>
            </div>
            <!-- Action buttons -->
            <div class="flex gap-1.5 mt-3 pt-3 border-t border-slate-800/70" @click.stop>
              <button x-show="['running','queued','paused'].includes(session.status)"
                      @click="sessionAction('stop', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-red-900/30 border border-red-700/40 text-red-400 hover:bg-red-900/60 transition-all"
                      x-text="t('btn_stop')"></button>
              <button x-show="session.status==='running'"
                      @click="sessionAction('pause', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-purple-900/30 border border-purple-700/40 text-purple-400 hover:bg-purple-900/60 transition-all"
                      x-text="t('btn_pause')"></button>
              <button x-show="session.status==='paused'"
                      @click="sessionAction('resume', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-blue-900/30 border border-blue-700/40 text-blue-400 hover:bg-blue-900/60 transition-all"
                      x-text="t('btn_resume')"></button>
              <button x-show="['completed','failed','stopped'].includes(session.status)"
                      @click="sessionAction('restart', session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-all"
                      x-text="t('btn_restart')"></button>
              <button x-show="session.status==='completed'"
                      @click.stop="previewVideo(session.id)"
                      class="px-2 py-1 text-xs rounded-md bg-indigo-900/30 border border-indigo-700/40 text-indigo-400 hover:bg-indigo-900/60 transition-all">▶ Önizle</button>
              <button @click="deleteSession(session.id, $event)"
                      class="px-2 py-1 text-xs rounded-md ml-auto bg-slate-800/50 border border-slate-700/50 text-slate-500 hover:text-red-400 hover:border-red-700/50 transition-all"
                      x-text="t('btn_delete')"></button>
            </div>
          </div>
        </template>
      </div>
    </div>
