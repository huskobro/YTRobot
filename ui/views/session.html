{# View: session #}
    <div x-show="view==='session'&&currentSession" class="p-6 max-w-5xl mx-auto">
      <div class="flex items-center gap-3 mb-6">
        <button @click="closeSession()" class="flex items-center gap-1.5 text-slate-400 hover:text-white transition-colors text-sm" x-text="t('back')"></button>
        <span class="text-slate-700">/</span>
        <h1 class="font-semibold text-white truncate flex-1" x-text="currentSession?.topic||currentSession?.id"></h1>
        <span class="shrink-0 px-3 py-1 rounded-full text-xs font-bold border" :class="statusBadge(currentSession?.status)"
              x-text="t('status_'+(currentSession?.status||'')) || (currentSession?.status||'').toUpperCase()"></span>
        <div class="flex gap-2 ml-2 shrink-0">
          <button x-show="['running','queued','paused'].includes(currentSession?.status)"
                  @click="sessionAction('stop', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-red-900/30 border border-red-700/40 text-red-400 hover:bg-red-900/60 transition-all"
                  x-text="t('btn_stop')"></button>
          <button x-show="currentSession?.status==='running'"
                  @click="sessionAction('pause', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-purple-900/30 border border-purple-700/40 text-purple-400 hover:bg-purple-900/60 transition-all"
                  x-text="t('btn_pause')"></button>
          <button x-show="currentSession?.status==='paused'"
                  @click="sessionAction('resume', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-blue-900/30 border border-blue-700/40 text-blue-400 hover:bg-blue-900/60 transition-all"
                  x-text="t('btn_resume')"></button>
          <button x-show="['completed','failed','stopped'].includes(currentSession?.status)"
                  @click="sessionAction('restart', currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-all"
                  x-text="t('btn_restart')"></button>
          <button x-show="currentSession?.status==='completed'"
                  @click="previewVideo(currentSession.id)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-indigo-900/30 border border-indigo-700/40 text-indigo-400 hover:bg-indigo-900/60 transition-all">▶ Önizle</button>
          <button x-show="currentSession?.status==='completed'"
                  @click="openUploadModal()"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-red-900/30 border border-red-700/40 text-red-400 hover:bg-red-900/60 transition-all">▲ YouTube'a Yükle</button>
          <button x-show="currentSession?.status==='completed'"
                  @click="downloadVideo()"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-emerald-900/30 border border-emerald-700/40 text-emerald-400 hover:bg-emerald-900/60 transition-all">⬇ İndir</button>
          <button @click="deleteSession(currentSession.id, $event)"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-800/50 border border-slate-700/50 text-slate-500 hover:text-red-400 hover:border-red-700/50 transition-all"
                  x-text="t('btn_delete')"></button>
        </div>
      </div>

      <!-- Step tracker -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 mb-4">
        <div class="flex items-center justify-between mb-5">
          <span class="text-sm font-semibold text-slate-300" x-text="t('progress_title')"></span>
          <span class="text-xs text-slate-500">
            <span x-text="(currentSession?.steps||[]).filter(s=>s.status==='completed').length"></span>/6 <span x-text="t('progress_complete')"></span>
          </span>
        </div>
        <div class="relative flex justify-between items-start px-2">
          <div class="absolute left-6 right-6 top-3.5 h-0.5 bg-slate-700 z-0"></div>
          <div class="absolute left-6 top-3.5 h-0.5 bg-green-500 z-0 transition-all duration-700"
               :style="`width: calc(${progressPct(currentSession)} * (100% - 48px) / 100)`"></div>
          <template x-for="(step, idx) in (currentSession?.steps||[])" :key="idx">
            <div class="relative flex flex-col items-center z-10" style="min-width:60px">
              <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold transition-all" :class="stepCircle(step.status)">
                <span x-show="step.status==='completed'">✓</span>
                <span x-show="step.status==='running'" class="animate-spin-slow">↻</span>
                <span x-show="step.status==='failed'">✗</span>
                <span x-show="step.status==='pending'" x-text="idx+1"></span>
              </div>
              <div class="text-center mt-2 text-xs leading-tight max-w-14"
                   :class="step.status==='completed'?'text-green-400':step.status==='running'?'text-blue-400 font-semibold':step.status==='failed'?'text-red-400':'text-slate-600'"
                   x-text="t('step_'+step.name.toLowerCase().replace(' ','_')) || step.name"></div>
            </div>
          </template>
        </div>
      </div>

      <!-- Log + Sidebar -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
        <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden flex flex-col">
          <div class="px-4 py-3 border-b border-slate-800 flex items-center justify-between shrink-0">
            <span class="text-sm font-semibold text-slate-300" x-text="t('live_log')"></span>
            <div class="flex items-center gap-3">
              <span class="text-xs text-slate-600" x-text="logLines.length+' '+t('lines')"></span>
              <div x-show="currentSession?.status==='running'" class="flex items-center gap-1.5">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                <span class="text-xs text-blue-400 font-medium" x-text="t('live')"></span>
              </div>
              <div x-show="currentSession?.status==='completed'" class="flex items-center gap-1.5">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-xs text-green-400 font-medium" x-text="t('done')"></span>
              </div>
              <div x-show="currentSession?.status==='failed'" class="flex items-center gap-1.5">
                <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                <span class="text-xs text-red-400 font-medium" x-text="t('failed_label')"></span>
              </div>
            </div>
          </div>
          <div id="log-container" class="h-72 overflow-y-auto p-4 bg-slate-950 space-y-0.5">
            <div x-show="logLines.length===0" class="text-slate-700 text-xs italic" x-text="t('waiting')"></div>
            <template x-for="(line,i) in logLines" :key="i">
              <div class="log-line whitespace-pre-wrap break-all"
                   :class="line.includes('✓')?'text-green-400':/\[\d\/6\]/.test(line)?'text-indigo-400 font-semibold':line.toLowerCase().includes('error')||line.toLowerCase().includes('failed')?'text-red-400':line.startsWith('  ')?'text-slate-400':'text-slate-300'"
                   x-text="line||' '"></div>
            </template>
          </div>
        </div>

        <div class="space-y-4">
          <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
            <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3" x-text="t('info')"></div>
            <dl class="space-y-2.5">
              <div>
                <dt class="text-xs text-slate-600" x-text="t('session_id')"></dt>
                <dd class="font-mono text-slate-300 text-xs mt-0.5" x-text="currentSession?.id"></dd>
              </div>
              <div>
                <dt class="text-xs text-slate-600" x-text="t('started')"></dt>
                <dd class="text-slate-300 text-xs mt-0.5" x-text="formatDate(currentSession?.started_at)"></dd>
              </div>
              <div x-show="currentSession?.completed_at">
                <dt class="text-xs text-slate-600" x-text="t('completed_at')"></dt>
                <dd class="text-slate-300 text-xs mt-0.5" x-text="formatDate(currentSession?.completed_at)"></dd>
              </div>
              <div x-show="currentSession?.output_file">
                <dt class="text-xs text-slate-600" x-text="t('output_file')"></dt>
                <dd class="text-green-400 text-xs font-mono mt-0.5 break-all" x-text="currentSession?.output_file"></dd>
              </div>
              <div x-show="currentSession?.error">
                <dt class="text-xs text-red-500" x-text="t('error')"></dt>
                <dd class="text-red-400 text-xs mt-0.5 break-all" x-text="currentSession?.error"></dd>
              </div>
            </dl>
          </div>

          <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
            <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2.5" x-text="t('notes')"></div>
            <textarea x-model="notes" @blur="saveNotes()"
                      class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 resize-none focus:outline-none focus:border-indigo-500 placeholder-slate-600 transition-colors"
                      rows="5" :placeholder="t('notes_placeholder')"></textarea>
            <div x-show="notesSaved" x-transition class="text-xs text-green-400 mt-1" x-text="t('notes_saved')"></div>
          </div>
        </div>
      </div>

      <!-- Thumbnail generation for completed sessions with thumbnail_concept -->
      <template x-if="currentSession?.status==='completed' && currentSession?.metadata?.thumbnail_concept">
        <div class="mt-4 p-4 bg-slate-800/50 border border-slate-700 rounded-2xl">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Thumbnail</h3>
            <button @click="generateThumbnail(currentSession)"
              :disabled="thumbnailGenerating"
              class="px-3 py-1.5 bg-amber-700 hover:bg-amber-600 disabled:opacity-40 text-white rounded-lg text-[10px] font-bold transition-all flex items-center gap-1.5">
              <svg x-show="thumbnailGenerating" class="w-3 h-3 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              <span x-text="thumbnailGenerating ? 'Üretiliyor...' : '🖼 Thumbnail Üret'"></span>
            </button>
          </div>
          <template x-if="currentSession._thumbnail_url">
            <img :src="currentSession._thumbnail_url" class="w-full rounded-xl border border-slate-700" alt="thumbnail" loading="lazy" decoding="async" />
          </template>
          <p x-show="!currentSession._thumbnail_url" class="text-[10px] text-slate-600" x-text="'Konsept: '+(currentSession.metadata?.thumbnail_concept||'').substring(0,80)+'...'"></p>
        </div>
      </template>

      <!-- Metadata (Editable) -->
      <div x-show="currentSession?.metadata" class="bg-slate-900 border border-slate-800 rounded-xl p-6">
        <div class="flex items-center justify-between mb-5">
          <span class="text-sm font-semibold text-slate-300" x-text="t('yt_metadata')"></span>
          <div class="flex items-center gap-2">
            <button x-show="!metadataEditing" @click="initEditableMetadata()" class="px-3 py-1 text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-slate-300 transition-colors">&#9998; Düzenle</button>
            <button x-show="metadataEditing" @click="saveMetadata()" class="px-3 py-1 text-xs bg-indigo-600 hover:bg-indigo-500 border border-indigo-500 rounded-lg text-white font-bold transition-colors">Kaydet</button>
            <button x-show="metadataEditing" @click="metadataEditing=false" class="px-3 py-1 text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-slate-400 transition-colors">Vazgeç</button>
            <button @click="copyMetadata()" class="px-3 py-1 text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-slate-300 transition-colors">
              <span x-show="!metaCopied" x-text="t('copy_all')"></span>
              <span x-show="metaCopied" class="text-green-400" x-text="t('copied')"></span>
            </button>
          </div>
        </div>
        <div class="space-y-5">
          <!-- View Mode -->
          <div x-show="!metadataEditing" class="space-y-5">
            <div>
              <div class="text-xs text-slate-500 mb-1.5 font-medium" x-text="t('title_label')"></div>
              <div class="text-white font-semibold text-lg leading-snug" x-text="currentSession?.metadata?.title"></div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1.5 font-medium" x-text="t('desc_label')"></div>
              <div class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap bg-slate-800/50 rounded-lg p-3"
                   x-text="currentSession?.metadata?.description"></div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-2 font-medium" x-text="t('tags_label')"></div>
              <div class="flex flex-wrap gap-1.5">
                <template x-for="tag in (currentSession?.metadata?.tags||[])" :key="tag">
                  <span class="px-2.5 py-0.5 bg-indigo-900/40 border border-indigo-700/40 rounded-full text-xs text-indigo-300" x-text="tag"></span>
                </template>
              </div>
            </div>
          </div>
          <!-- Edit Mode -->
          <div x-show="metadataEditing" class="space-y-4">
            <div>
              <label class="block text-xs text-slate-500 mb-1.5 font-medium" x-text="t('title_label')"></label>
              <input x-model="editableMetadata.title" type="text"
                     class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" />
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1.5 font-medium" x-text="t('desc_label')"></label>
              <textarea x-model="editableMetadata.description" rows="5"
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 resize-none focus:outline-none focus:border-indigo-500 transition-colors"></textarea>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1.5 font-medium" x-text="t('tags_label')"></label>
              <input x-model="editableMetadata.tags" type="text" placeholder="tag1, tag2, tag3"
                     class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" />
              <p class="text-[10px] text-slate-600 mt-1">Virgülle ayırın</p>
            </div>
          </div>
        </div>
        <!-- Action Buttons Row -->
        <div x-show="currentSession?.status==='completed'" class="flex flex-wrap gap-2 mt-5 pt-5 border-t border-slate-800">
          <button @click="downloadVideo()" class="px-4 py-2 text-xs font-bold rounded-lg bg-emerald-900/30 border border-emerald-700/40 text-emerald-400 hover:bg-emerald-900/60 transition-all flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            İndir
          </button>
          <button @click="openUploadModal()" class="px-4 py-2 text-xs font-bold rounded-lg bg-red-900/30 border border-red-700/40 text-red-400 hover:bg-red-900/60 transition-all flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            YouTube'a Yükle
          </button>
          <button @click="saveAsTemplate()" class="px-4 py-2 text-xs font-bold rounded-lg bg-violet-900/30 border border-violet-700/40 text-violet-400 hover:bg-violet-900/60 transition-all flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
            Şablon Olarak Kaydet
          </button>
          <button x-show="currentSession?.metadata" @click="analyzeSeo()" :disabled="seoLoading"
                  class="px-4 py-2 text-xs font-bold rounded-lg bg-amber-900/30 border border-amber-700/40 text-amber-400 hover:bg-amber-900/60 transition-all flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span x-text="seoLoading ? 'Analiz ediliyor...' : 'SEO Analizi'"></span>
          </button>
        </div>
      </div>

      <!-- SEO Analysis Panel -->
      <div x-show="currentSession?.metadata && currentSession?.status === 'completed'" class="bg-slate-900 border border-slate-800 rounded-xl p-6">
        <div class="flex items-center justify-between mb-5">
          <span class="text-sm font-semibold text-slate-300" x-text="t('seo_title')"></span>
          <button @click="analyzeSeo()" :disabled="seoLoading"
                  class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all"
                  :class="seoLoading ? 'bg-slate-700 text-slate-500 cursor-wait' : 'bg-indigo-600 hover:bg-indigo-500 text-white'">
            <span x-show="!seoLoading" x-text="t('seo_analyze')"></span>
            <span x-show="seoLoading" x-text="t('seo_analyzing')"></span>
          </button>
        </div>

        <!-- SEO Results -->
        <div x-show="seoResult">
          <!-- Overall Score -->
          <div class="flex items-center gap-4 mb-5">
            <div class="text-xs text-slate-500 font-medium" x-text="t('seo_score')"></div>
            <span class="px-3 py-1 rounded-full text-sm font-black" :class="seoScoreColor(seoResult?.score || 0)"
                  x-text="(seoResult?.score || 0) + '/100'"></span>
          </div>

          <!-- Analysis Details -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-5">
            <!-- Title Analysis -->
            <div class="bg-slate-800/50 rounded-lg p-3">
              <div class="text-[10px] text-slate-500 font-bold uppercase mb-2" x-text="t('title_label')"></div>
              <div class="space-y-1.5">
                <template x-if="seoResult?.title_analysis">
                  <div>
                    <div class="flex justify-between text-xs"><span x-text="t('seo_title_length')"></span><span class="text-slate-400" x-text="(seoResult.title_analysis.length||0)+' '+t('seo_chars')"></span></div>
                    <div x-show="seoResult.title_analysis.has_numbers !== undefined" class="flex justify-between text-xs mt-1">
                      <span>Numbers</span>
                      <span :class="seoResult.title_analysis.has_numbers ? 'text-green-400' : 'text-slate-500'" x-text="seoResult.title_analysis.has_numbers ? '✓' : '✗'"></span>
                    </div>
                    <div x-show="seoResult.title_analysis.has_power_words !== undefined" class="flex justify-between text-xs mt-1">
                      <span>Power Words</span>
                      <span :class="seoResult.title_analysis.has_power_words ? 'text-green-400' : 'text-slate-500'" x-text="seoResult.title_analysis.has_power_words ? '✓' : '✗'"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Description Analysis -->
            <div class="bg-slate-800/50 rounded-lg p-3">
              <div class="text-[10px] text-slate-500 font-bold uppercase mb-2" x-text="t('desc_label')"></div>
              <div class="space-y-1.5">
                <template x-if="seoResult?.description_analysis">
                  <div>
                    <div class="flex justify-between text-xs"><span x-text="t('seo_desc_length')"></span><span class="text-slate-400" x-text="(seoResult.description_analysis.length||0)+' '+t('seo_chars')"></span></div>
                    <div x-show="seoResult.description_analysis.has_cta !== undefined" class="flex justify-between text-xs mt-1">
                      <span>CTA</span>
                      <span :class="seoResult.description_analysis.has_cta ? 'text-green-400' : 'text-slate-500'" x-text="seoResult.description_analysis.has_cta ? '✓' : '✗'"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Tags -->
          <div x-show="seoResult?.tags_analysis" class="bg-slate-800/50 rounded-lg p-3 mb-5">
            <div class="text-[10px] text-slate-500 font-bold uppercase mb-2" x-text="t('tags_label')"></div>
            <div class="flex justify-between text-xs"><span x-text="t('seo_tag_count')"></span><span class="text-slate-400" x-text="(seoResult?.tags_analysis?.count||0)+' '+t('seo_tags')"></span></div>
          </div>

          <!-- Suggestions -->
          <div x-show="seoResult?.suggestions?.length">
            <div class="text-[10px] text-slate-500 font-bold uppercase mb-2" x-text="t('seo_suggestions')"></div>
            <ul class="space-y-1.5">
              <template x-for="(s, idx) in (seoResult?.suggestions||[])" :key="idx">
                <li class="text-xs text-slate-300 bg-slate-800/50 rounded-lg px-3 py-2 flex items-start gap-2">
                  <span class="text-yellow-400 shrink-0">!</span>
                  <span x-text="s"></span>
                </li>
              </template>
            </ul>
          </div>
        </div>

        <!-- No results yet -->
        <div x-show="!seoResult && !seoLoading" class="text-center py-6">
          <div class="text-slate-600 text-sm" x-text="t('seo_analyze') + ' ↑'"></div>
        </div>
      </div>
    </div>
